name: Sync book catalog

on:
  schedule:
    # Weekly, Monday 06:00 UTC — Gutendex/Gutenberg metadata for a fixed
    # catalog essentially never changes, so this just guards against drift.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:books
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
