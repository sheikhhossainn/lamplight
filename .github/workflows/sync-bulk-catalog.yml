name: Sync bulk book catalog

# Daily while catching up on the ~5,000-book target (see
# scripts/sync-bulk-catalog.mjs) — once reached, every run is a fast no-op,
# so this is safe to just leave running indefinitely rather than needing to
# be manually disabled.
on:
  schedule:
    - cron: '0 7 * * *' # daily 07:00 UTC
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:bulk-catalog
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
